[hotkey]
# Common evdev key names: KEY_RIGHTALT, KEY_LEFTALT, KEY_RIGHTCTRL, KEY_LEFTCTRL, KEY_CAPSLOCK, KEY_SPACE
key = "KEY_RIGHTALT"
double_click_ms = 400

[recording]
sample_rate = 16000
# Auto-stop after this many seconds of silence.
timeout_seconds = 10

[whisper]
model = "base"
language = "en"

[output]
target = "clipboard"
